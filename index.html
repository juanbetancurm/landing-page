<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LabOlavs — Learning tools for everyone</title>
    <script>
      (function () {
        var theme = localStorage.getItem("theme") || "light";
        var language = localStorage.getItem("labolavs_language") || "en";
        var isSpanish = language === "es";

        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.lang = isSpanish ? "es" : "en";
        document.title = isSpanish
          ? "LabOlavs — Herramientas de aprendizaje para todos"
          : "LabOlavs — Learning tools for everyone";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
